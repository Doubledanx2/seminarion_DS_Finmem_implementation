# FinMem-Ours — OUR headline configuration (Stage 8: 6-month train). NFLX.
# Frozen at FinMem-Ours freeze #3. Train 2025-07-01..2025-12-31, test 2026-01-02..2026-06-01.

[chat]
model = "gpt-4.1-mini"
end_point = "https://api.openai.com/v1/chat/completions"
system_message = "You are a helpful assistant."
temperature = 1.0
daily_token_budget = 2400000
wait_for_reset = false                       # Stage 8: paid overflow AUTHORIZED
paid_overflow = true
paid_cap_usd = 3.00                          # hard chat-spend cap (Dan, $5 deposited)

[general]
top_k = 5
agent_name = "agent_1"
look_back_window_size = 7
trading_symbol = "NFLX"
persona_rule = "paper_rule"
persona_switch_window = 3
observation_window = 7
extended_reflection = true
extended_reflection_target = "long"
extended_reflection_train = true
long_only = true
unit_position = true
disable_downward_jumps = true
pure_age_recency = true
filing_seed_file = "data/02_intermediate/filing_seeds.json"
character_string = '''You accumulate a lot of information of the following sectors so you are especially good at trading them:
(1) Streaming Entertainment and Subscription Video on Demand.
(2) Original Content Production and Licensing.
(3) Digital Advertising (ad-supported subscription tiers).
(4) Consumer Internet and Engagement Platforms.
(5) Mobile Gaming.

You are an expert of NFLX (Netflix, Inc.), the world's largest subscription streaming
service, which produces and licenses films and series globally, introduced an
ad-supported tier in late 2022 and a paid-sharing program in 2023, and competes with
Disney+, Amazon Prime Video, Max and YouTube for viewing time. Its results are highly
sensitive to net subscriber additions, average revenue per membership, content slate
strength, and advertising momentum.'''
character_string_test = '''You accumulate a lot of information of the following sectors so you are especially good at trading them:
