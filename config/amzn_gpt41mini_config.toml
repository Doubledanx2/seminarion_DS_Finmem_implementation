# Stage-2 reproduction config — AMZN (ARCHITECTURE.md §2/§4, addendum A4).
# Hyperparameters FROZEN at paper values. Persona uses ONLY pre-2025-02 facts (A4.3).

[chat]
model = "gpt-4.1-mini"                       # decision model, cutoff Jun-2024 (A3.3: exact string)
end_point = "https://api.openai.com/v1/chat/completions"
system_message = "You are a helpful assistant."
temperature = 1.0                            # A4.5: pinned = API default; as-shipped sent none
daily_token_budget = 2400000                 # OpenAI data-sharing mini pool, headroom kept
wait_for_reset = true                        # sleep across 00:00 UTC instead of erroring

[general]
top_k = 5                                    # A4.7: paper value (repo default config had 3)
agent_name = "agent_1"
look_back_window_size = 7
trading_symbol = "AMZN"
persona_rule = "as_shipped"                  # B8: main result; "paper_rule" = ablation variant
long_only = true                             # Sin 7: Sell closes to flat, never shorts (main run)
character_string = '''
You accumulate a lot of information of the following sectors so you are especially good at trading them:
(1) E-commerce and Online Retail.
(2) Cloud Computing and Infrastructure (IaaS/PaaS).
(3) Digital Advertising.
(4) Logistics and Fulfillment Networks.
(5) Consumer Devices and AI Services.

You are an expert of AMZN (Amazon.com, Inc.), which operates the leading global online
retail marketplace, the Amazon Web Services (AWS) cloud platform, a fast-growing
advertising business, Prime subscriptions, and devices/services including Alexa.
Its results are highly sensitive to AWS growth and margins, retail unit economics,
advertising revenue, capital expenditure on data centers and AI, and consumer demand.
'''

[agent.agent_1.embedding.detail]
backend = "local"                            # bge-large on RTX 3090 (deviation D-emb, dim 1024)
embedding_model = "BAAI/bge-large-en-v1.5"   # set backend="openai" + "text-embedding-ada-002" for paper path
chunk_size = 5000
verbose = false

[short]
importance_score_initialization = "sample"
decay_params = {recency_factor=14.0, importance_factor=0.92}  # paper value (slide 16, sensitivity-justified); repo shipped 3.0 — discrepancy logged
clean_up_threshold_dict = {recency_threshold=0.05, importance_threshold=5}
jump_threshold_upper = 60

[mid]
jump_threshold_lower = 60
jump_threshold_upper = 80
importance_score_initialization = "sample"
decay_params = {recency_factor=90.0, importance_factor=0.967}
clean_up_threshold_dict = {recency_threshold=0.05, importance_threshold=5}

[long]
jump_threshold_lower = 80
importance_score_initialization = "sample"
decay_params = {recency_factor=365.0, importance_factor=0.988}
clean_up_threshold_dict = {recency_threshold=0.05, importance_threshold=5}

[reflection]
importance_score_initialization = "sample"
decay_params = {recency_factor=365.0, importance_factor=0.988}
clean_up_threshold_dict = {recency_threshold=0.05, importance_threshold=5}
